<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Examination Portal</title>

<style>

body{
margin:0;
background:#eef3f8;
font-family:Arial,Helvetica,sans-serif;
}

header{
background:#082d5b;
color:white;
padding:18px;
text-align:center;
}

.container{
width:380px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin-top:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

.captcha{
display:flex;
justify-content:space-between;
align-items:center;
margin:15px 0;
}

#captchaText{
background:#1c4fa3;
color:white;
padding:10px 20px;
border-radius:5px;
font-weight:bold;
letter-spacing:3px;
}

button{
width:100%;
padding:14px;
background:#0b8b5f;
color:white;
font-size:17px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#08774f;
}

</style>

</head>

<body>

<header>

<h2>Genesis Examination Portal</h2>

<p>Result Verification</p>

</header>

<div class="container">

<input placeholder="Application Number">

<input type="date">

<div class="captcha">

<div id="captchaText">
AB7X9Q
</div>

<button style="width:60px;" onclick="newCaptcha()">↻</button>

</div>

<input id="userCaptcha"
placeholder="Enter CAPTCHA">

<button onclick="verify()">

Verify Result

</button>

</div>

<script>

let currentCaptcha="AB7X9Q";

function random(){

const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

let text="";

for(let i=0;i<6;i++){

text+=chars[Math.floor(Math.random()*chars.length)];

}

return text;

}

function newCaptcha(){

currentCaptcha=random();

document.getElementById("captchaText").innerHTML=currentCaptcha;

}

function verify(){

let user=document.getElementById("userCaptcha").value;

if(user===currentCaptcha){

window.location.href="result.html";

}

else{

alert("Incorrect CAPTCHA");

newCaptcha();

}

}

</script>

</body>

</html>
